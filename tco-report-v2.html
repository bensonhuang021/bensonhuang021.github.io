<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCO & Shut Out Report V33 (Scroll Fix)</title>
    <style>
        :root {
            --primary: #4b5563;       
            --primary-light: #6b7280; 
            --accent-blue: #607d8b;   
            --secondary: #e5e7eb;     
            --bg-color: #f3f4f6;      
            --surface: #ffffff;       
            --text-dark: #374151;     
            --text-muted: #9ca3af;    
            --danger: #be123c;        
            --success-bg: #f0fdf4;    
            --success-text: #166534;
            --warning-bg: #fffbeb;    
            --warning-text: #92400e;
        }

        * { box-sizing: border-box; } 

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            letter-spacing: 0.03em;
        }

        .main-container { width: 100%; max-width: 1400px; display: flex; flex-direction: column; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; border-bottom: 1px solid var(--secondary); padding-bottom: 2px;}
        .tab-nav { display: flex; gap: 15px; }
        .user-panel { display: flex; align-items: center; gap: 15px; padding-bottom: 8px; font-size: 0.95rem; color: var(--primary); font-weight: bold;}
        .btn-logout { background: transparent; border: 1px solid var(--text-muted); color: var(--text-dark); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s;}
        .btn-logout:hover { background: var(--secondary); }

        .tab-btn {
            background-color: transparent; color: var(--text-muted); border: none; padding: 10px 20px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .tab-btn::after {
            content: ''; position: absolute; bottom: -3px; left: 0; width: 100%; height: 3px;
            background-color: var(--accent-blue); transform: scaleX(0); transition: transform 0.3s ease;
        }
        .tab-btn:hover { color: var(--text-dark); }
        .tab-btn.active { color: var(--text-dark); }
        .tab-btn.active::after { transform: scaleX(1); }

        .tab-content { display: none; width: 100%; align-items: flex-start; justify-content: space-between; gap: 20px;}
        .tab-content.active { display: flex; }
        
        .form-section { width: 55%; background: var(--surface); padding: 25px 30px; border-radius: 6px; border: 1px solid var(--secondary); flex-shrink: 0;}
        
        /* 🚨 V33 修復：加入 overflow-y: auto 讓整個右側區塊可以獨立滑動 */
        .right-column { 
            width: calc(45% - 20px); display: flex; flex-direction: column; gap: 20px; 
            position: sticky; top: 15px; height: calc(100vh - 30px); 
            overflow-y: auto; padding-right: 5px;
        }
        
        .output-section { background: var(--surface); padding: 25px 30px; border-radius: 6px; border: 1px solid var(--secondary); display: flex; flex-direction: column; flex-shrink: 0;}
        .history-section { background: var(--surface); padding: 25px 30px; border-radius: 6px; border: 1px solid var(--secondary); display: flex; flex-direction: column; flex: 1; min-height: 300px;}

        h2 { margin-top: 0; color: var(--text-dark); font-size: 1.15rem; font-weight: 600; display: flex; align-items: center; margin-bottom: 20px; border-left: 4px solid var(--accent-blue); padding-left: 10px; line-height: 1; }
        h3 { color: var(--primary-light); font-size: 1.05rem; font-weight: 600; margin-bottom: 15px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: 500; margin-bottom: 6px; font-size: 0.85rem; color: var(--primary-light); }
        
        input[type="text"], input[type="password"], input[type="date"], input[type="number"], select, textarea {
            padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 0.95rem; transition: all 0.2s; background-color: #fdfdfd; width: 100%; color: var(--text-dark);
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="date"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--accent-blue); background-color: var(--surface); box-shadow: 0 0 0 1px var(--accent-blue);
        }
        input[readonly] { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; } 

        .delay-code-builder { background-color: #f9fafb; padding: 20px; border-radius: 6px; margin-bottom: 15px; border: 1px solid var(--secondary); }
        .delay-code-item { display: flex; gap: 10px; align-items: center; background: var(--surface); padding: 6px 10px; border-radius: 4px; border: 1px solid var(--secondary); margin-top: 10px; font-size: 0.85rem; }
        .delay-desc { flex: 1; color: var(--primary-light); font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .log-entry { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; width: 100%; }
        input[type="text"].log-time { width: 75px !important; flex: 0 0 75px !important; text-align: center; background-color: #f1f5f9; font-weight: bold; }
        input[type="text"].log-desc { flex: 1 !important; }
        
        button { background-color: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        button:hover { background-color: #374151; }
        
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px dashed var(--primary); width: 100%; margin-top: 10px;}
        .btn-outline:hover { background-color: #f3f4f6; border-style: solid; }
        .btn-danger { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 8px; font-size: 0.75rem;}
        .btn-danger:hover { background-color: #fff1f2; }
        
        .btn-tag { background-color: #f1f5f9; color: var(--text-dark); border: 1px solid #cbd5e1; border-radius: 20px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin-bottom: 5px;}
        .btn-tag.active { background-color: var(--accent-blue); color: #ffffff; border-color: var(--accent-blue); }
        
        /* 🚨 V33 修復：加入 height 跟 overflow-y 讓報告太長時，在框框內自己生出捲軸 */
        pre { 
            background: #2d3748; color: #f7fafc; padding: 20px; border-radius: 6px; 
            white-space: pre-wrap; word-wrap: break-word; font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 14px; line-height: 1.6; height: 35vh; min-height: 200px; overflow-y: auto; 
            border: 1px solid #1a202c; margin: 0; 
        }
        
        .validation-box { margin-top: 15px; padding: 12px; border-radius: 4px; font-size: 0.85rem; display: none; line-height: 1.5; }
        .validation-warning { background-color: var(--warning-bg); color: var(--warning-text); border-left: 4px solid #f59e0b; }
        .validation-match { background-color: var(--success-bg); color: var(--success-text); border-left: 4px solid #10b981; }
        .text-red { color: var(--danger); font-weight: 600; }

        .btn-save { width: 100%; padding: 12px; font-size: 1rem; font-weight: 600; background-color: #10b981; margin-top: 15px; border-radius: 4px; color: white; display: flex; justify-content: center; align-items: center;}
        .btn-save:hover { background-color: #059669; }
        
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; margin-top: 10px; }
        .history-card { background: #f8fafc; border: 1px solid var(--secondary); border-radius: 6px; padding: 12px; cursor: pointer; transition: all 0.2s;}
        .history-card:hover { border-color: var(--accent-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .history-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; margin-bottom: 6px; }
        .history-title { font-size: 0.95rem; font-weight: 600; color: var(--primary); display: flex; align-items: center; }
        
        .type-badge { font-size: 0.7rem; font-weight: normal; color: #6b7280; border: 1px solid #cbd5e1; padding: 2px 6px; border-radius: 12px; margin-left: 8px; background-color: #ffffff; }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent-blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin-right: 10px; display: none;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 🚪 登入畫面 */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: var(--surface); padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 380px;
            border: 1px solid var(--secondary); text-align: center;
        }
        .login-box h2 { border-left: none; padding-left: 0; justify-content: center; margin-bottom: 30px; font-size: 1.5rem;}
        .login-input { margin-bottom: 20px; text-align: left; }
        .login-btn { width: 100%; padding: 12px; font-size: 1rem; margin-top: 10px; display: flex; justify-content: center; align-items: center;}

        .pax-card { background-color: #f9fafb; border: 1px solid var(--secondary); padding: 20px; border-radius: 6px; margin-bottom: 15px; position: relative; }
        .pax-card-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 15px; }

        hr { border: 0; height: 1px; background-color: var(--secondary); margin: 25px 0; }

        @media screen and (max-width: 1024px) {
            .tab-content { flex-direction: column; }
            .form-section, .right-column { width: 100%; height: auto; }
            .right-column { position: static; overflow: visible; }
            pre { height: auto; min-height: 200px; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>✈️ TCO System Login</h2>
        <div class="login-input">
            <label>帳號 (Account)</label>
            <input type="text" id="login-account" placeholder="輸入帳號">
        </div>
        <div class="login-input">
            <label>密碼 (Password)</label>
            <input type="password" id="login-password" placeholder="輸入密碼" onkeypress="if(event.key === 'Enter') doLogin()">
        </div>
        <button class="login-btn" id="btn-login" onclick="doLogin()">
            <div class="loader" id="loader-login"></div> 登入系統
        </button>
        <p id="login-msg" style="color: var(--danger); font-size: 0.85rem; display: none; margin-top: 15px;"></p>
    </div>
</div>

<div class="main-container">
    
    <div class="header-nav">
        <div class="tab-nav">
            <button class="tab-btn active" id="btn-tco" onclick="switchTab('tco')">TCO 報告</button>
            <button class="tab-btn" id="btn-shutout" onclick="switchTab('shutout')">減人報告</button>
        </div>
        <div class="user-panel">
            <span id="display-username">Loading...</span>
            <button class="btn-logout" onclick="doLogout()">登出</button>
        </div>
    </div>

    <div id="tab-tco" class="tab-content active">
        <div class="form-section">
            <h2>TCO 報告填寫</h2>
            <div class="row">
                <div class="col"><label>Flight</label><input type="text" id="flight"></div>
                <div class="col"><label>Date</label><input type="date" id="date"></div>
            </div>
            <div class="row">
                <div class="col"><label>STA</label><input type="text" id="sta" maxlength="4"></div>
                <div class="col"><label>STD</label><input type="text" id="std" maxlength="4"></div>
                <div class="col"><label>ETA</label><input type="text" id="eta" maxlength="4"></div>
                <div class="col"><label>ETD</label><input type="text" id="etd" maxlength="4"></div>
            </div>
            <div class="row">
                <div class="col"><label>ATA</label><input type="text" id="ata" maxlength="4"></div>
                <div class="col"><label>ATD</label><input type="text" id="atd" maxlength="4"></div>
                <div class="col"><label>DCT</label><input type="text" id="dct" maxlength="4"></div>
            </div>
            <div class="row">
                <div class="col"><label>PTS</label><select id="pts"><option value="N">N</option><option value="Y">Y</option></select></div>
                <div class="col"><label>OTP</label><select id="otp"><option value="N">N</option><option value="Y">Y</option></select></div>
                <div class="col"><label>Early cleaning</label><select id="earlyCleaning"><option value="Y">Y</option><option value="N">N</option></select></div>
            </div>
            
            <div class="delay-code-builder">
                <label style="margin: 0; color: var(--text-dark); display: block; margin-bottom: 8px; font-weight: 600;">Delay Code</label>
                <div class="row" style="margin-bottom: 0; align-items: center;">
                    <div class="col" style="flex: 2;">
                        <select id="inputDelayCode"><option value="">-- 選擇 Delay Code --</option></select>
                    </div>
                    <div class="col" style="flex: 1; flex-direction: row; align-items: center; gap: 5px;">
                        <input type="text" id="inputDelayHH" maxlength="2" placeholder="時" style="text-align:center;"> : 
                        <input type="text" id="inputDelayMM" maxlength="2" placeholder="分" style="text-align:center;">
                    </div>
                    <div><button type="button" onclick="addDelayCode()">新增</button></div>
                </div>
                <div id="addedCodesContainer"></div>
            </div>

            <div class="row">
                <div class="col">
                    <div id="summary-buttons" style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px;">
                        <button type="button" class="btn-tag" data-reason="flight late arrival" onclick="toggleSummaryReason(this)">1. Late arrival</button>
                        <button type="button" class="btn-tag" data-reason="prolonged cabin cleaning" onclick="toggleSummaryReason(this)">2. Cleaning</button>
                        <button type="button" class="btn-tag" data-reason="prolonged offloading and loading process" onclick="toggleSummaryReason(this)">3. Load/Offload</button>
                        <button type="button" class="btn-tag" data-reason="searching for missing pax" onclick="toggleSummaryReason(this)">4. Missing pax</button>
                        <button type="button" class="btn-tag" data-reason="arrival airport ATC hold" onclick="toggleSummaryReason(this)">5. ATC hold</button>
                    </div>
                    <textarea id="summary" placeholder="Summary..."></textarea>
                </div>
            </div>
            
            <hr style="margin: 15px 0;">
            
            <h3>時間軸紀錄 (Log)</h3>
            <span class="helper-text" style="margin-bottom: 10px;">💡 提示：請在左側填寫時間，未填寫時間的項目將不會顯示在右側報告中。</span>
            <div id="logContainer"></div>
            <button type="button" class="btn-outline" onclick="addCustomLog()">新增自訂時間</button>
            <button type="button" class="btn-outline" style="border-color:var(--danger); color:var(--danger)" onclick="clearForm('TCO')">清除表單</button>
        </div>

        <div class="right-column">
            <div class="output-section">
                <h2>報告預覽</h2>
                <pre id="outputReport">報告產生中...</pre>
                <div id="delayValidation" class="validation-box"></div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-save" style="flex: 2; margin-top: 0;" id="btn-save-tco" onclick="saveToCloud('TCO')">
                        <div class="loader" id="loader-tco"></div>💾 儲存至雲端
                    </button>
                    <button class="btn-outline" style="flex: 1; margin-top: 0;" onclick="copyText('outputReport')">📋 複製</button>
                </div>
            </div>

            <div class="history-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 style="margin: 0; border-left-color: #10b981;">📂 您的歷史紀錄</h2>
                    <button type="button" class="btn-small" style="background-color:#f1f5f9; color:#4b5563; border: 1px solid #cbd5e1;" onclick="fetchHistory()">🔄 重新整理</button>
                </div>
                <div class="history-list" id="history-list"></div>
            </div>
        </div>
    </div>

    <div id="tab-shutout" class="tab-content">
        <div class="form-section">
            <h2>減人報告 (Shut Out)</h2>
            <div class="row">
                <div class="col"><label>Flight</label><input type="text" id="shut-flight" placeholder="e.g. CX565"></div>
                <div class="col"><label>Date</label><input type="date" id="shut-date"></div>
            </div>
            
            <div id="paxListContainer"></div>
            <button type="button" class="btn-outline" onclick="addPaxCard()">新增拉下旅客</button>
            
            <hr style="margin: 15px 0;">
            
            <div class="row">
                <div class="col"><label>Amended from</label><input type="number" id="shut-from" placeholder="310"></div>
                <div class="col"><label>Amended to</label><input type="number" id="shut-to" placeholder="308"></div>
            </div>
            <button type="button" class="btn-outline" style="border-color:var(--danger); color:var(--danger); margin-top: 30px;" onclick="clearForm('ShutOut')">清除表單</button>
        </div>

        <div class="right-column">
            <div class="output-section">
                <h2>減人預覽</h2>
                <pre id="outputShutOutReport">報告產生中...</pre>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-save" style="flex: 2; margin-top: 0;" id="btn-save-shutout" onclick="saveToCloud('ShutOut')">
                        <div class="loader" id="loader-shutout"></div>💾 儲存至雲端
                    </button>
                    <button class="btn-outline" style="flex: 1; margin-top: 0;" onclick="copyText('outputShutOutReport')">📋 複製</button>
                </div>
            </div>

            <div class="history-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 style="margin: 0; border-left-color: #10b981;">📂 您的歷史紀錄</h2>
                    <button type="button" class="btn-small" style="background-color:#f1f5f9; color:#4b5563; border: 1px solid #cbd5e1;" onclick="fetchHistory()">🔄 重新整理</button>
                </div>
                <div class="history-list" id="history-list-shutout"></div>
            </div>
        </div>
    </div>

</div>

<div id="historyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
    <div style="background:#fff; width:90%; max-width:500px; padding:25px; border-radius:8px;">
        <h3 id="modalTitle" style="margin-top:0;">歷史報告</h3>
        <pre id="modalContent" style="min-height:200px; padding:15px; margin-bottom:15px;"></pre>
        <div style="display:flex; gap:10px;">
            <button style="flex:1;" onclick="copyText('modalContent')">📋 複製內容</button>
            <button style="flex:1; background-color:#e5e7eb; color:#374151;" onclick="document.getElementById('historyModal').style.display='none'">關閉</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxNN1yDRgLH65oTqd0K8L7RkHX1sLE92DzNgBlbXN1VeZst0KNdQebwVJnb7-rUxOz/exec"; 

    // 更換記憶體金鑰以刷新狀態
    let memoryKey = 'tco_user_v33';
    let currentUser = localStorage.getItem(memoryKey);

    window.onload = function() {
        if (currentUser && currentUser !== "undefined") {
            document.getElementById('loginOverlay').style.display = 'none';
            updateGreeting(currentUser);
            initApp();
        }
    };

    function doLogin() {
        const acc = document.getElementById('login-account').value.trim();
        const pwd = document.getElementById('login-password').value.trim();
        const msg = document.getElementById('login-msg');
        const btn = document.getElementById('btn-login');
        const loader = document.getElementById('loader-login');

        if(!acc || !pwd) { msg.style.display = 'block'; msg.textContent = "請輸入帳號與密碼"; return; }

        btn.disabled = true; loader.style.display = 'inline-block'; msg.style.display = 'none';

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: 'login', account: acc, password: pwd })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                let finalName = data.name;
                if (!finalName || String(finalName).trim().toLowerCase() === 'undefined') {
                    finalName = acc; 
                }
                
                currentUser = finalName;
                localStorage.setItem(memoryKey, currentUser); 
                
                document.getElementById('loginOverlay').style.display = 'none';
                updateGreeting(currentUser);
                initApp(); 
            } else {
                msg.style.display = 'block';
                msg.textContent = data.message || "登入失敗，請確認帳號密碼";
            }
        })
        .catch(err => {
            msg.style.display = 'block';
            msg.textContent = "網路連線發生錯誤！";
        })
        .finally(() => {
            btn.disabled = false; loader.style.display = 'none';
        });
    }

    function doLogout() {
        if(confirm("確定要登出嗎？")) {
            localStorage.removeItem(memoryKey);
            location.reload(); 
        }
    }

    // 💡 智慧時間問候引擎
    function updateGreeting(name) {
        const now = new Date();
        const hour = now.getHours();
        const min = now.getMinutes();
        const timeVal = hour + (min / 60);
        
        let greeting = "Good evening";
        
        if (timeVal >= 4 && timeVal <= 11) {
            greeting = "Good morning";
        } else if (timeVal > 11 && timeVal <= 17) {
            greeting = "Good afternoon";
        } 

        document.getElementById('display-username').textContent = `${greeting}, ${name}`;
    }

    function initApp() {
        buildDelayDB(); 
        populateDelayCodeSelect(); 
        initLogs(); 
        initPaxList(); 
        generateReport(); 
        generateShutOutReport();
        fetchHistory(); 
    }

    function buildDelayDB() {

            if(!line.trim()) return;
            const match = line.trim().match(/^([A-Z0-9]{3})\s+(.+)$/i);
            if (match) delayDB[match[1].toUpperCase()] = match[2].replace(/^"|"$/g, '').trim();
        });

    function formatTime(val) { return val ? val + 'L' : '----L'; }
    function formatAviationDate(dateStr) {
        if (!dateStr) return ''; const p = dateStr.split('-'); if (p.length !== 3) return dateStr.toUpperCase();
        const m = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC']; return p[2] + m[parseInt(p[1],10)-1];
    }
    function timeStrToIntMins(ts) { if(!ts||ts.length!==4||isNaN(ts)) return null; return parseInt(ts.substring(0,2),10)*60 + parseInt(ts.substring(2,4),10); }

    function getLogTimeStr(logs, descSnippet) {
        const log = logs.find(l => l.descStr && l.descStr.toLowerCase().includes(descSnippet.toLowerCase()));
        return log ? log.timeStr : null;
    }

    function generateReport() {
        const f = document.getElementById('flight').value.toUpperCase() || "----";
        const d = formatAviationDate(document.getElementById('date').value) || "----";
        const rep = currentUser || "----"; 
        
        const sta = formatTime(document.getElementById('sta').value); const std = formatTime(document.getElementById('std').value);
        const eta = formatTime(document.getElementById('eta').value); const etd = formatTime(document.getElementById('etd').value);
        const ata = formatTime(document.getElementById('ata').value); const atd = formatTime(document.getElementById('atd').value);
        const dctVal = document.getElementById('dct').value; const dct = dctVal ? `(DCT/${formatTime(dctVal)})` : '';
        
        let dCode = ''; let dDesc = ''; 
        if (selectedDelayCodes.length > 0) {
            dCode = `DL${selectedDelayCodes.map(i=>i.code).join('/')}/${selectedDelayCodes.map(i=>i.time).join('/')}\n`;
            selectedDelayCodes.forEach(i => dDesc += `//${i.code}// ${i.desc}\n`);
        }
        
        let logs = []; 
        document.querySelectorAll('#tab-tco .log-entry').forEach(e => {
            const t = e.querySelector('.log-time').value.trim(); 
            const text = e.querySelector('.log-desc').value.trim();
            if (t) logs.push({timeStr: t, descStr: text});
        });
        
        logs.sort((a,b) => {
            let nA = parseInt(a.timeStr,10)||9999; let nB = parseInt(b.timeStr,10)||9999;
            if(Math.abs(nA-nB)>1200) { if(nA<nB) nA+=2400; else nB+=2400; } return nA-nB;
        });
        
        let res = `--${f}/${d} TCO report--\nSTA/${sta} , STD/${std}\nETA/${eta} , ETD/${etd}\nATA/${ata} , ATD/${atd}${dct}\nPTS: ${document.getElementById('pts').value}\nOTP: ${document.getElementById('otp').value}\nEarly cleaning: ${document.getElementById('earlyCleaning').value}\n`;
        if(dCode) res += dCode + dDesc;
        if(document.getElementById('summary').value) res += document.getElementById('summary').value + "\n";
        res += `--\n` + logs.map(l => `${l.timeStr}L ${l.descStr}\n`).join('');
        res += rep ? `End of report/${rep}` : `End of report`;
        
        document.getElementById('outputReport').textContent = res;

        const validationBox = document.getElementById('delayValidation');
        let staMins = timeStrToIntMins(document.getElementById('sta').value); let ataMins = timeStrToIntMins(document.getElementById('ata').value);
        let stdMins = timeStrToIntMins(document.getElementById('std').value); let atdMins = timeStrToIntMins(document.getElementById('atd').value);
        let hasDelayWarning = false; let warningHTML = ""; let taskHTML = "";
        let totalExplainedMins = selectedDelayCodes.reduce((sum, item) => sum + (timeStrToIntMins(item.time)||0), 0);

        if (staMins !== null && ataMins !== null) {
            let arrDiff = ataMins - staMins; if (arrDiff < -720) arrDiff += 24 * 60; 
            if (arrDiff > 0) {
                hasDelayWarning = true;
                taskHTML += `<div class="task-alert">👉 建議 Code 判斷：飛機晚到 <span class="text-red">${arrDiff}</span> 分鐘</div>`;
                validationBox.className = 'validation-box validation-warning';
            }
        }

        if (stdMins !== null && atdMins !== null) {
            let actualDelayMins = atdMins - stdMins; if (actualDelayMins < -720) actualDelayMins += 24 * 60; 
            if (actualDelayMins > 0) {
                hasDelayWarning = true; let diffMins = actualDelayMins - totalExplainedMins;
                if (diffMins > 0) {
                    warningHTML = `<strong>⚠️ 實際起飛 Delay 時間為 ${actualDelayMins} 分鐘。</strong><br>已解釋 ${totalExplainedMins} 分鐘，還需 <strong>${minsToDurationStr(diffMins)}</strong> 補充說明！`;
                    validationBox.className = 'validation-box validation-warning';
                } else if (diffMins < 0) {
                    warningHTML = `<strong>⚠️ 警告：解釋時間 (${totalExplainedMins} 分) 超過總 Delay (${actualDelayMins} 分)！</strong>`;
                    validationBox.className = 'validation-box validation-warning';
                } else {
                    warningHTML = `<strong>✅ 時間與 DELAY CODE 完全吻合 (${actualDelayMins} 分鐘)</strong>`;
                    validationBox.className = 'validation-box validation-match';
                }
            }
        }

        let taskChecks = [
            { start: "Pax off started", end: "Pax off completed", std: 8, name: "PAX OFF" },
            { start: "Cleaning started", end: "Cleaning completed", std: 20, name: "CABIN CLEANING" },
            { start: "Boarding signal released", end: "All pax onboard", std: 20, name: "BOARDING" }
        ];

        taskChecks.forEach(task => {
            let sStr = getLogTimeStr(logs, task.start); let eStr = getLogTimeStr(logs, task.end);
            if (sStr && eStr) {
                let s = timeStrToIntMins(sStr); let e = timeStrToIntMins(eStr);
                if (s !== null && e !== null) {
                    let actual = e - s; if (actual < 0) actual += 24 * 60;
                    if (actual > task.std) {
                        hasDelayWarning = true;
                        taskHTML += `<div class="task-alert">👉 建議 Code 判斷：${task.name} 超時 <span class="text-red">${actual - task.std}</span> 分鐘 (實際 ${actual} 分)</div>`;
                        if(validationBox.className !== 'validation-box validation-warning') validationBox.className = 'validation-box validation-warning';
                    }
                }
            }
        });

        if (hasDelayWarning) { validationBox.style.display = 'block'; validationBox.innerHTML = warningHTML + taskHTML; } 
        else { validationBox.style.display = 'none'; }
    }

    function generateShutOutReport() {

    function saveToCloud(type) {
        const btn = document.getElementById(type === 'TCO' ? 'btn-save-tco' : 'btn-save-shutout');
        const loader = document.getElementById(type === 'TCO' ? 'loader-tco' : 'loader-shutout');
        
        let flight = type === 'TCO' ? document.getElementById('flight').value : document.getElementById('shut-flight').value;
        let date = type === 'TCO' ? document.getElementById('date').value : document.getElementById('shut-date').value;
        let reporter = currentUser || "未登入";
        let content = document.getElementById(type === 'TCO' ? 'outputReport' : 'outputShutOutReport').textContent;

        if (!flight) flight = "未填寫";
        if (date) date = formatAviationDate(date); else date = "未填寫";
        if (content.includes('報告產生中')) return alert("沒有內容可以儲存！");

        const payload = { action: 'save', type: type, flight: flight.toUpperCase(), date: date, reporter: reporter, content: content };

        btn.disabled = true; loader.style.display = 'inline-block';

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => { alert("🎉 報告已成功儲存至雲端！"); fetchHistory(); })
        .catch(err => { alert("儲存成功！(或發生跨網域錯誤，請重整確認)"); fetchHistory(); })
        .finally(() => { btn.disabled = false; loader.style.display = 'none'; });
    }

    function fetchHistory() {
        if (!currentUser) return;
        
        const lists = [document.getElementById('history-list'), document.getElementById('history-list-shutout')];
        lists.forEach(l => l.innerHTML = '<div style="text-align:center; color:#9ca3af; margin-top:30px;">🔄 抓取專屬資料中...</div>');

        fetch(SCRIPT_URL + "?user=" + encodeURIComponent(currentUser))
        .then(res => res.json())
        .then(data => {
            lists.forEach(l => l.innerHTML = '');
            if (data.length === 0) {
                lists.forEach(l => l.innerHTML = '<div style="text-align:center; color:#9ca3af;">您目前沒有歷史紀錄</div>'); return;
            }
            
            data.forEach(item => {
                const card = document.createElement('div'); card.className = 'history-card';
                const d = new Date(item.timestamp);
                const timeStr = d.getMonth()+1 + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
                const tagColor = item.type === 'TCO' ? '#0f4c81' : '#be123c';

                card.innerHTML = `<div class="history-meta"><span style="color: ${tagColor}; font-weight:bold;">[${item.reporter}]</span><span>${timeStr}</span></div><div class="history-title">${item.flight} (${item.date}) <span class="type-badge">${item.type}</span></div>`;
                card.onclick = () => showModal(item);
                document.getElementById('history-list').appendChild(card.cloneNode(true));
                document.getElementById('history-list-shutout').appendChild(card);
                document.getElementById('history-list').lastChild.onclick = () => showModal(item);
            });
        })
        .catch(err => { lists.forEach(l => l.innerHTML = '<div style="text-align:center; color:var(--danger);">連線失敗</div>'); });
    }

    function showModal(item) {
        document.getElementById('modalTitle').textContent = `${item.flight} (${item.date}) - ${item.type} 報告`;
        document.getElementById('modalContent').textContent = item.content;
        document.getElementById('historyModal').style.display = 'flex';
    }
</script>

</body>
</html>
