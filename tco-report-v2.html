<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCO & Shut Out Report V19 (Fixed Layout)</title>
    <style>
        :root {
            --primary: #4b5563;       
            --primary-light: #6b7280; 
            --accent-blue: #607d8b;   
            --secondary: #e5e7eb;     
            --bg-color: #f3f4f6;      
            --surface: #ffffff;       
            --text-dark: #374151;     
            --text-muted: #9ca3af;    
            --danger: #be123c;        
            --success-bg: #f0fdf4;    
            --success-text: #166534;
            --warning-bg: #fffbeb;    
            --warning-text: #92400e;
        }

        * { box-sizing: border-box; } /* 確保所有元素的寬度計算都包含 padding */

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            letter-spacing: 0.03em;
        }

        .main-container {
            width: 100%;
            max-width: 1350px; /* 適合多數筆電的黃金寬度 */
            display: flex;
            flex-direction: column;
        }
        
        .tab-nav {
            display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--secondary); padding-bottom: 2px;
        }
        .tab-btn {
            background-color: transparent; color: var(--text-muted); border: none; padding: 10px 20px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .tab-btn::after {
            content: ''; position: absolute; bottom: -3px; left: 0; width: 100%; height: 3px;
            background-color: var(--accent-blue); transform: scaleX(0); transition: transform 0.3s ease;
        }
        .tab-btn:hover { color: var(--text-dark); }
        .tab-btn.active { color: var(--text-dark); }
        .tab-btn.active::after { transform: scaleX(1); }

        /* 絕對寬度比例，防止版面變形跑位 */
        .tab-content { display: none; width: 100%; align-items: flex-start; justify-content: space-between;}
        .tab-content.active { display: flex; }
        
        .form-section { width: 58%; background: var(--surface); padding: 25px 30px; border-radius: 6px; border: 1px solid var(--secondary); flex-shrink: 0;}
        .output-section { width: calc(42% - 20px); background: var(--surface); padding: 25px 30px; border-radius: 6px; border: 1px solid var(--secondary); flex-shrink: 0; position: sticky; top: 20px; }

        h2 {
            margin-top: 0; color: var(--text-dark); font-size: 1.2rem; font-weight: 600;
            display: flex; align-items: center; margin-bottom: 20px;
            border-left: 4px solid var(--accent-blue); padding-left: 10px; line-height: 1;
        }
        
        h3 { color: var(--primary-light); font-size: 1.05rem; font-weight: 600; margin-bottom: 15px; }

        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: 500; margin-bottom: 6px; font-size: 0.85rem; color: var(--primary-light); }
        
        input[type="text"], input[type="date"], input[type="number"], select, textarea {
            padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 0.95rem; transition: all 0.2s; background-color: #fdfdfd; width: 100%; color: var(--text-dark);
        }
        input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--accent-blue); background-color: var(--surface); box-shadow: 0 0 0 1px var(--accent-blue);
        }
        input[type="date"] { cursor: pointer; }
        select {
            cursor: pointer; appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236b7280%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 10px top 50%; background-size: 10px auto; padding-right: 30px;
        }
        textarea { resize: vertical; min-height: 70px; }
        
        .delay-code-builder { background-color: #f9fafb; padding: 20px; border-radius: 6px; margin-bottom: 20px; border: 1px solid var(--secondary); }
        .delay-code-item { display: flex; gap: 10px; align-items: center; background: var(--surface); padding: 8px 12px; border-radius: 4px; border: 1px solid var(--secondary); margin-top: 10px; font-size: 0.9rem; }
        .delay-desc { flex: 1; color: var(--primary-light); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .log-entry { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; width: 100%; }
        
        /* 🚨 強制鎖定時間欄位的寬度，解決格子過大的問題 */
        input[type="text"].log-time { width: 85px !important; flex: 0 0 85px !important; text-align: center; background-color: #f1f5f9; font-weight: bold; }
        input[type="text"].log-desc { flex: 1 !important; }
        
        button { background-color: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        button:hover { background-color: #374151; }
        
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px dashed var(--primary); width: 100%; margin-top: 10px;}
        .btn-outline:hover { background-color: #f3f4f6; border-style: solid; }
        
        .btn-danger { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; }
        .btn-danger:hover { background-color: #fff1f2; }
        
        .btn-clear { background-color: transparent; color: var(--text-muted); border: 1px dashed var(--text-muted); width: 100%; margin-top: 25px; padding: 12px; font-size: 1rem; }
        .btn-clear:hover { border-color: var(--danger); color: var(--danger); }
        
        .btn-small { padding: 5px 8px; font-size: 0.8rem; border-radius: 4px;}
        
        pre { background: #2d3748; color: #f7fafc; padding: 25px; border-radius: 6px; white-space: pre-wrap; word-wrap: break-word; overflow-x: hidden; font-family: 'Consolas', 'Courier New', monospace; font-size: 14.5px; line-height: 1.6; letter-spacing: 0.03em; min-height: 350px; border: 1px solid #1a202c; }
        
        .validation-box { margin-top: 20px; padding: 14px 18px; border-radius: 4px; font-size: 0.9rem; display: none; line-height: 1.6; }
        .validation-warning { background-color: var(--warning-bg); color: var(--warning-text); border-left: 4px solid #f59e0b; }
        .validation-match { background-color: var(--success-bg); color: var(--success-text); border-left: 4px solid #10b981; }
        .task-alert { font-size: 0.85rem; margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(0,0,0,0.1); }
        .text-red { color: var(--danger); font-weight: 600; }

        .copy-btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: 600; background-color: var(--accent-blue); margin-top: 15px; border-radius: 4px; }
        .copy-btn:hover { background-color: #4b636e; }
        
        .helper-text { font-size: 0.8rem; color: var(--text-muted); margin-top: -5px; margin-bottom: 15px; display: block;}
        
        .pax-card { background-color: #f9fafb; border: 1px solid var(--secondary); padding: 20px; border-radius: 6px; margin-bottom: 15px; position: relative; }
        .pax-card-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 15px; }

        .time-input-group { display: flex; flex-direction: row; align-items: center; gap: 5px; }
        .time-input-group input[type="text"] { flex: 1; text-align: center; }
        
        hr { border: 0; height: 1px; background-color: var(--secondary); margin: 25px 0; }

        /* 📱 手機版專用 RWD 設計 (小於 800px 才會觸發，確保筆電雙畫面不會誤判) */
        @media screen and (max-width: 800px) {
            body { padding: 10px; } 
            .tab-content { flex-direction: column; gap: 15px; }
            .form-section { width: 100%; padding: 20px 15px; }
            .output-section { width: 100%; padding: 20px 15px; position: static; margin-top: 0; }
            .row { flex-direction: column; gap: 10px; margin-bottom: 10px; }
            .tab-nav { flex-wrap: wrap; gap: 0; border-bottom: none; }
            .tab-btn { flex: 1; padding: 12px 5px; font-size: 1rem; text-align: center; border-bottom: 1px solid var(--secondary); border-radius: 0; }
            .delay-code-builder .row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <div class="tab-nav">
        <button class="tab-btn active" id="btn-tco" onclick="switchTab('tco')">TCO 報告</button>
        <button class="tab-btn" id="btn-shutout" onclick="switchTab('shutout')">減人報告 (Shut Out)</button>
    </div>

    <div id="tab-tco" class="tab-content active">
        <div class="form-section">
            <h2>TCO 報告填寫</h2>
            
            <div class="row">
                <div class="col"><label>Flight</label><input type="text" id="flight"></div>
                <div class="col"><label>Date</label><input type="date" id="date"></div>
                <div class="col"><label>Reporter</label><input type="text" id="reporter"></div>
            </div>

            <div class="row">
                <div class="col"><label>STA (計算用)</label><input type="text" id="sta" maxlength="4"></div>
                <div class="col"><label>STD (計算用)</label><input type="text" id="std" maxlength="4"></div>
                <div class="col"><label>ETA</label><input type="text" id="eta" maxlength="4"></div>
                <div class="col"><label>ETD</label><input type="text" id="etd" maxlength="4"></div>
            </div>
            <div class="row">
                <div class="col"><label>ATA (計算用)</label><input type="text" id="ata" maxlength="4"></div>
                <div class="col"><label>ATD (計算用)</label><input type="text" id="atd" maxlength="4"></div>
                <div class="col"><label>DCT (Optional)</label><input type="text" id="dct" maxlength="4"></div>
            </div>

            <div class="row">
                <div class="col"><label>PTS</label><select id="pts"><option value="N">N</option><option value="Y">Y</option></select></div>
                <div class="col"><label>OTP</label><select id="otp"><option value="N">N</option><option value="Y">Y</option></select></div>
                <div class="col"><label>Early cleaning</label><select id="earlyCleaning"><option value="Y">Y</option><option value="N">N</option></select></div>
            </div>

            <div class="delay-code-builder">
                <label style="margin: 0; color: var(--text-dark); display: block; margin-bottom: 12px; font-weight: 600;">Delay Code 自動計算</label>
                <div class="row" style="margin-bottom: 0; align-items: center;">
                    <div class="col" style="flex: 2;">
                        <select id="inputDelayCode">
                            <option value="">-- 請選擇 Delay Code --</option>
                        </select>
                    </div>
                    <div class="col time-input-group" style="flex: 1;">
                        <input type="text" id="inputDelayHH" maxlength="2" placeholder="時">
                        <span style="font-weight: 400; color: var(--text-muted);">:</span>
                        <input type="text" id="inputDelayMM" maxlength="2" placeholder="分">
                    </div>
                    <div><button type="button" onclick="addDelayCode()">新增</button></div>
                </div>
                <div id="addedCodesContainer"></div>
            </div>

            <div class="row">
                <div class="col"><label>Delay Summary</label><textarea id="summary"></textarea></div>
            </div>

            <hr>

            <h3>時間軸紀錄 (Chronological Log)</h3>
            <span class="helper-text">💡 提示：請在左側填寫時間，未填寫時間的項目將不會顯示在右側報告中。</span>
            
            <div id="logContainer"></div>
            <button type="button" class="btn-outline" onclick="addCustomLog()">新增自訂時間紀錄</button>
            <button type="button" class="btn-clear" onclick="clearTCOForm()">清除 TCO 表格內容</button>
        </div>

        <div class="output-section">
            <h2>TCO 預覽</h2>
            <pre id="outputReport">您的報告將會顯示在這裡...</pre>
            <div id="delayValidation" class="validation-box"></div>
            <button class="copy-btn" onclick="copyText('outputReport')">複製 TCO 報告</button>
        </div>
    </div>
    
    <div id="tab-shutout" class="tab-content">
        <div class="form-section">
            <h2>減人報告 (Shut Out)</h2>
            
            <div class="row">
                <div class="col">
                    <label>Reporter (通報人)</label>
                    <input type="text" id="shut-reporter" placeholder="e.g. Benson">
                </div>
            </div>

            <div id="paxListContainer"></div>
            <button type="button" class="btn-outline" onclick="addPaxCard()">新增拉下旅客</button>

            <hr>

            <div class="row">
                <div class="col">
                    <label>原本總人數 (Amended from)</label>
                    <input type="number" id="shut-from" placeholder="e.g. 310">
                </div>
                <div class="col">
                    <label>最終總人數 (Amended to)</label>
                    <input type="number" id="shut-to" placeholder="e.g. 308">
                </div>
            </div>

            <button type="button" class="btn-clear" onclick="clearShutOutForm()">清除減人表格內容</button>
        </div>

        <div class="output-section">
            <h2>減人預覽</h2>
            <pre id="outputShutOutReport">您的減人報告將會顯示在這裡...</pre>
            <button class="copy-btn" onclick="copyText('outputShutOutReport')">複製減人報告</button>
        </div>
    </div>

</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
        
        if(tabId === 'tco') generateReport();
        if(tabId === 'shutout') generateShutOutReport();
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    }

    const rawData = `
ADC	Arrival Airport Restriction - Curfew/Night/Noise
ADD	Arrival Airport Restriction - Runway/Taxiway
ADG	Arrival Airport Restriction - Operational Concern
ADO	Arrival Airport Restriction - Other
AEK	Air Traffic Control due to Non-Weather - Arrival Airport
AFC	Airport Facility - Ground Traffic
AFH	Airport Facility - Cargo Terminal
AFJ	Airport Facility - Jet Bridge
AFL	Airport Facility - Baggage
AFN	Airport Facility - Passenger Terminal
AFO	Airport Facility - Apron
AFP	Airport Facility - Parking Bay Availability
AGB	Customs/Immigration/Quarantine - Disembarkation/Boarding
AGC	Customs/Immigration/Quarantine - Congestion/Facility/Staff
AGD	Customs/Immigration/Quarantine - Passenger
AGO	Customs/Immigration/Quarantine - Other
AMA	Air Traffic Control due to Non-Weather - Departure Airport
AMC	Departure Airport Restriction - Curfew/Night/Noise
AMD	Departure Airport Restriction - Runway/Taxiway
AMO	Departure Airport Restriction - Other
AMR	Ground Traffic - Aircraft Towing
AMS	Ground Traffic - Aircraft Pushback
AMW	Air Traffic Control due to Weather - Departure Airport
ASC	Mandatory Security - Cargo/Mail
ASE	Mandatory Security - Additional Requirement
ASF	Mandatory Security - Facility
ASI	Mandatory Security - Aircraft
ASL	Mandatory Security - Staff Lateness / Lack of
ASN	Mandatory Security - Aerobridge / Boarding Gate
ASS	Mandatory Security - Staff Error
ASU	Mandatory Security - Baggage Offload
ASX	Mandatory Security - Passenger / Hand Baggage
ATK	Air Traffic Control due to Non-Weather – En Route
GLS	Loading/Unloading – Staff Availability
GLC	Loading/Unloading – Cargo
GLB	Loading/Unloading – Baggage
RAN	Aircraft Rotation - Network
RAP	Aircraft Rotation - Passenger
RAT	Aircraft Rotation - Technical
RAU	Aircraft Rotation - Authority
RAW	Aircraft Rotation - Weather
RCA	Crew Rotation - Flight Deck / Entire Crew
RLO	Load Connection - Non- CX Group
RLX	Load Connection - CX Group
ROB	Operation Control - Crewing
ROC	Operation Control - Flight Consolidation
ROH	Operation Control - Aircraft Change
ROR	Operation Control - Diversion/Reroute
ROV	Operation Control - Await First Available Aircraft
RSA	Crew Rotation - Cabin Crew
RTK	Through Check-In
SGK	Scheduled Ground Time
TAA	Technical - AOG Spare from other Aircraft/Station
TAE	Technical - AOG Spare for other Aircraft/Station
TCT	Technical - Aircraft Change
TDA	Technical - Without Aircraft Change
TDD	Technical - Engineering Documentation
TDL	Technical - Cargo Loading System (CLS)
TDT	Technical - High Cabin Temperature
TDU	Technical - Extra Start-Up Time
TLT	Technical - Await First Available Aircraft
TML	Technical - Aircraft Towing due to Servicing Equipment after Maintenance
TMS	Technical - Aircraft Towing due to Servicing Staff after Maintenance
TMT	Technical - Scheduled Maintenance
TNA	Technical - Non-Scheduled Maintenance
TSS	Technical - Lack of Spare
TST	Technical - Await Spare from Technical Store
WGI	Weather - Ground Handling Impaired
WIK	Weather - Aircraft Frost/Ice/Snow Handling
WOK	Weather - Departure Airport
WRK	Weather - Alternate / En Route
WSR	Weather - Airport Ice/Snow
    `;

    let delayDB = {};
    let selectedDelayCodes = [];

    function buildDelayDB() {
        const lines = rawData.trim().split('\n');
        lines.forEach(line => {
            if(!line.trim()) return;
            let parts = line.split('\t'); 
            if(parts.length < 2) parts = line.split(','); 
            if (parts.length >= 2) {
                const code = parts[0].trim().toUpperCase();
                const desc = parts.slice(1).join(',').replace(/^"|"$/g, '').trim(); 
                if (code && code.length >= 2) delayDB[code] = desc;
            }
        });
    }

    function populateDelayCodeSelect() {
        const select = document.getElementById('inputDelayCode');
        select.innerHTML = '<option value="">-- 請選擇 Delay Code --</option>';
        const sortedKeys = Object.keys(delayDB).sort();
        for (const code of sortedKeys) {
            const option = document.createElement('option');
            option.value = code; option.textContent = `${code} - ${delayDB[code]}`; select.appendChild(option);
        }
    }

    function addDelayCode() {
        const codeInput = document.getElementById('inputDelayCode');
        const hhInput = document.getElementById('inputDelayHH');
        const mmInput = document.getElementById('inputDelayMM');
        
        const code = codeInput.value;
        if (!code) return alert("請從下拉選單選擇 Delay Code！");
        
        let hh = hhInput.value.trim(); let mm = mmInput.value.trim();
        if (!hh && !mm) return alert("請輸入時間（小時或分鐘）！");
        
        hh = hh ? hh.padStart(2, '0') : '00';
        mm = mm ? mm.padStart(2, '0') : '00';
        let time = hh + mm;
        
        selectedDelayCodes.push({ code, time, desc: delayDB[code] || "Custom Code" });
        
        codeInput.value = ''; hhInput.value = ''; mmInput.value = '';
        renderDelayCodes(); generateReport();
    }

    function removeDelayCode(index) { selectedDelayCodes.splice(index, 1); renderDelayCodes(); generateReport(); }

    function renderDelayCodes() {
        const container = document.getElementById('addedCodesContainer');
        container.innerHTML = '';
        selectedDelayCodes.forEach((item, index) => {
            const div = document.createElement('div'); div.className = 'delay-code-item';
            div.innerHTML = `<strong>${item.code}</strong> (${item.time}) <span class="delay-desc">${item.desc}</span> <button class="btn-danger btn-small" onclick="removeDelayCode(${index})">✕</button>`;
            container.appendChild(div);
        });
    }

    const defaultLogs = [
        "A/C chocks on.", "Pax off started.", "Pax off completed.", "Cleaning started.",
        "Cleaning completed.", "Cabin security check started.", "Boarding signal released.",
        "All pax onboard.", "Last cabin door closed.", "Last cargo hold door closed.", "Aircraft pushback."
    ];

    function initLogs() {
        const container = document.getElementById('logContainer');
        container.innerHTML = ''; 
        defaultLogs.forEach(desc => { addLogItem('', desc); });
    }

    function addCustomLog() {
        addLogItem('', '');
        generateReport();
    }

    function addLogItem(time = '', desc = '') {
        const container = document.getElementById('logContainer');
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';
        // 🚨 這裡加上 placeholder，讓使用者清楚知道哪裡填時間 🚨
        logEntry.innerHTML = `
            <input type="text" class="log-time" maxlength="4" value="${time}" placeholder="時間">
            <input type="text" class="log-desc" value="${desc}" placeholder="請輸入項目說明...">
            <button tabindex="-1" type="button" class="btn-danger btn-small" onclick="removeLog(this)">✕</button>
        `;
        container.appendChild(logEntry);
    }

    function removeLog(button) { button.parentElement.remove(); generateReport(); }

    function clearTCOForm() {
        if (!confirm("確定要清除 TCO 報告內容嗎？")) return;
        const textInputs = ['flight', 'date', 'reporter', 'sta', 'std', 'eta', 'etd', 'ata', 'atd', 'dct', 'summary', 'inputDelayHH', 'inputDelayMM'];
        textInputs.forEach(id => document.getElementById(id).value = '');
        document.getElementById('pts').value = 'N'; document.getElementById('otp').value = 'N';
        document.getElementById('earlyCleaning').value = 'Y'; document.getElementById('inputDelayCode').value = '';
        selectedDelayCodes = []; renderDelayCodes(); initLogs(); generateReport();
    }

    function formatTime(val) { return val ? val + 'L' : '----L'; }
    function formatAviationDate(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr.toUpperCase();
        const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        return parts[2] + months[parseInt(parts[1], 10) - 1];
    }
    function timeStrToIntMins(timeStr) {
        if (!timeStr || timeStr.length !== 4 || isNaN(timeStr)) return null;
        let h = parseInt(timeStr.substring(0,2), 10); let m = parseInt(timeStr.substring(2,4), 10);
        return h * 60 + m;
    }
    function minsToDurationStr(mins) {
        let h = Math.floor(mins / 60); let m = mins % 60;
        return String(h).padStart(2, '0') + String(m).padStart(2, '0');
    }
    function getLogTimeStr(logs, descSnippet) {
        const log = logs.find(l => l.descStr.toLowerCase().includes(descSnippet.toLowerCase()));
        return log ? log.timeStr : null;
    }

    function generateReport() {
        const flight = document.getElementById('flight').value.toUpperCase();
        const rawDate = document.getElementById('date').value;
        const date = formatAviationDate(rawDate);
        const reporter = document.getElementById('reporter').value;
        const staVal = document.getElementById('sta').value; const ataVal = document.getElementById('ata').value;
        const stdVal = document.getElementById('std').value; const atdVal = document.getElementById('atd').value;
        const sta = formatTime(staVal); const std = formatTime(stdVal);
        const eta = formatTime(document.getElementById('eta').value); const etd = formatTime(document.getElementById('etd').value);
        const ata = formatTime(ataVal); const atd = formatTime(atdVal);
        const dctVal = document.getElementById('dct').value; const dctStr = dctVal ? `(DCT/${formatTime(dctVal)})` : '';
        const pts = document.getElementById('pts').value; const otp = document.getElementById('otp').value;
        const earlyCleaning = document.getElementById('earlyCleaning').value;

        let delayCodeString = ''; let delayDescString = ''; let totalExplainedMins = 0; 
        if (selectedDelayCodes.length > 0) {
            const codes = selectedDelayCodes.map(item => item.code).join('/');
            const times = selectedDelayCodes.map(item => item.time).join('/');
            delayCodeString = `DL${codes}/${times}\n`;
            selectedDelayCodes.forEach(item => { 
                delayDescString += `//${item.code}// ${item.desc}\n`; 
                totalExplainedMins += timeStrToIntMins(item.time) || 0;
            });
        }
        const summary = document.getElementById('summary').value.trim();

        let logText = ''; let validLogs = [];
        document.querySelectorAll('#tab-tco .log-entry').forEach(entry => {
            const time = entry.querySelector('.log-time').value.trim();
            const desc = entry.querySelector('.log-desc').value.trim();
            if (time) validLogs.push({ timeStr: time, descStr: desc });
        });

        validLogs.sort((a, b) => {
            let tA = parseInt(a.timeStr, 10); let tB = parseInt(b.timeStr, 10);
            if (isNaN(tA)) tA = 9999; if (isNaN(tB)) tB = 9999;
            if (Math.abs(tA - tB) > 1200) { if (tA < tB) tA += 2400; else tB += 2400; }
            return tA - tB;
        });

        validLogs.forEach(log => { logText += `${log.timeStr}L ${log.descStr}\n`; });

        let report = `--${flight || "----"}/${date || "----"} TCO report--\n`;
        report += `STA/${sta} , STD/${std}\nETA/${eta} , ETD/${etd}\nATA/${ata} , ATD/${atd}${dctStr}\nPTS: ${pts}\nOTP: ${otp}\nEarly cleaning: ${earlyCleaning}\n`;
        if (delayCodeString) { report += delayCodeString; report += delayDescString; }
        if (summary) report += `${summary}\n`;
        report += `--\n`;
        if (logText) report += `${logText}`;
        report += reporter ? `End of report/${reporter}` : `End of report`;

        document.getElementById('outputReport').textContent = report;

        const validationBox = document.getElementById('delayValidation');
        let staMins = timeStrToIntMins(staVal); let ataMins = timeStrToIntMins(ataVal);
        let stdMins = timeStrToIntMins(stdVal); let atdMins = timeStrToIntMins(atdVal);
        let hasDelayWarning = false; let warningHTML = ""; let taskHTML = "";

        if (staMins !== null && ataMins !== null) {
            let arrDiff = ataMins - staMins; if (arrDiff < -720) arrDiff += 24 * 60; 
            if (arrDiff > 0) {
                hasDelayWarning = true;
                taskHTML += `<div class="task-alert">👉 建議 Code 判斷：飛機晚到 <span class="text-red">${arrDiff}</span> 分鐘</div>`;
                validationBox.className = 'validation-box validation-warning';
            }
        }

        if (stdMins !== null && atdMins !== null) {
            let actualDelayMins = atdMins - stdMins; if (actualDelayMins < -720) actualDelayMins += 24 * 60; 
            if (actualDelayMins > 0) {
                hasDelayWarning = true; let diffMins = actualDelayMins - totalExplainedMins;
                if (diffMins > 0) {
                    warningHTML = `<strong>⚠️ 實際起飛 Delay 時間為 ${actualDelayMins} 分鐘。</strong><br>已解釋 ${totalExplainedMins} 分鐘，還需 <strong>${minsToDurationStr(diffMins)}</strong> 補充說明！`;
                    validationBox.className = 'validation-box validation-warning';
                } else if (diffMins < 0) {
                    warningHTML = `<strong>⚠️ 警告：解釋時間 (${totalExplainedMins} 分) 超過總 Delay (${actualDelayMins} 分)！</strong>`;
                    validationBox.className = 'validation-box validation-warning';
                } else {
                    warningHTML = `<strong>✅ 時間與 DELAY CODE 完全吻合 (${actualDelayMins} 分鐘)</strong>`;
                    validationBox.className = 'validation-box validation-match';
                }
            }
        }

        let taskChecks = [
            { start: "Pax off started", end: "Pax off completed", std: 8, name: "PAX OFF" },
            { start: "Cleaning started", end: "Cleaning completed", std: 20, name: "CABIN CLEANING" },
            { start: "Boarding signal released", end: "All pax onboard", std: 20, name: "BOARDING" }
        ];

        taskChecks.forEach(task => {
            let sStr = getLogTimeStr(validLogs, task.start); let eStr = getLogTimeStr(validLogs, task.end);
            if (sStr && eStr) {
                let s = timeStrToIntMins(sStr); let e = timeStrToIntMins(eStr);
                if (s !== null && e !== null) {
                    let actual = e - s; if (actual < 0) actual += 24 * 60;
                    if (actual > task.std) {
                        hasDelayWarning = true;
                        taskHTML += `<div class="task-alert">👉 建議 Code 判斷：${task.name} 超時 <span class="text-red">${actual - task.std}</span> 分鐘 (實際 ${actual} 分)</div>`;
                        if(validationBox.className !== 'validation-box validation-warning') validationBox.className = 'validation-box validation-warning';
                    }
                }
            }
        });

        if (hasDelayWarning) {
            validationBox.style.display = 'block'; validationBox.innerHTML = warningHTML + taskHTML;
        } else {
            validationBox.style.display = 'none';
        }
    }

    // ==========================================
    // Shut Out Report 邏輯
    // ==========================================
    let paxCountInternal = 0;

    function initPaxList() {
        const container = document.getElementById('paxListContainer');
        container.innerHTML = '';
        paxCountInternal = 0;
        addPaxCard(); 
    }

    function addPaxCard() {
        paxCountInternal++;
        const container = document.getElementById('paxListContainer');
        const div = document.createElement('div');
        div.className = 'pax-card';
        div.innerHTML = `
            <div class="pax-card-title">Passenger #${paxCountInternal}</div>
            <button tabindex="-1" type="button" class="btn-danger btn-small" style="position: absolute; top: 15px; right: 20px;" onclick="removePaxCard(this)">✕</button>
            <div class="row" style="margin-bottom: 12px;">
                <div class="col">
                    <label>旅客姓名 (Pax Name)</label>
                    <input type="text" class="pax-name" placeholder="e.g. CHEN/DAMING MR">
                </div>
            </div>
            <div class="row" style="margin-bottom: 0;">
                <div class="col">
                    <label>SEC 號碼</label>
                    <input type="text" class="pax-sec" placeholder="e.g. 204">
                </div>
                <div class="col">
                    <label>座位號碼 (SNB)</label>
                    <input type="text" class="pax-seat" placeholder="e.g. 41A">
                </div>
            </div>
        `;
        container.appendChild(div);
        generateShutOutReport();
    }

    function removePaxCard(btn) {
        const container = document.getElementById('paxListContainer');
        if (container.children.length <= 1) {
            alert("至少需要保留一位旅客資料！");
            return;
        }
        btn.parentElement.remove();
        generateShutOutReport();
    }

    function clearShutOutForm() {
        if (!confirm("確定要清除減人報告內容嗎？")) return;
        document.getElementById('shut-reporter').value = '';
        document.getElementById('shut-from').value = '';
        document.getElementById('shut-to').value = '';
        initPaxList(); 
    }

    function generateShutOutReport() {
        const reporter = document.getElementById('shut-reporter').value.trim() || "----";
        const fromPax = document.getElementById('shut-from').value || "---";
        const toPax = document.getElementById('shut-to').value || "---";

        let paxDetailsList = [];
        const paxCards = document.querySelectorAll('.pax-card');
        
        paxCards.forEach(card => {
            const name = card.querySelector('.pax-name').value.toUpperCase().trim() || "----";
            
            let sec = card.querySelector('.pax-sec').value.toUpperCase().trim();
            if (sec && !sec.startsWith("SEC")) sec = "SEC " + sec;
            if (!sec) sec = "----";

            let seat = card.querySelector('.pax-seat').value.toUpperCase().trim();
            if (seat && !seat.startsWith("SNB")) seat = "SNB" + seat;
            if (!seat) seat = "----";

            paxDetailsList.push(`${name} ${sec} ${seat}`);
        });

        let totalOffload = paxDetailsList.length;
        let formattedCount = String(totalOffload).padStart(2, '0');
        let joinedPaxString = paxDetailsList.join(', ');

        let report = `Shut out ${formattedCount} online check-in pax ${joinedPaxString}.\n`;
        report += `Nil any check-in bag, inflight PA and vacant seat check completed.\n`;
        report += `Nor any passed security check point record found.\n`;
        report += `Final figure amended from ${fromPax} to ${toPax}.\n`;
        report += `End of report/${reporter}`;

        document.getElementById('outputShutOutReport').textContent = report;
    }

    document.getElementById('tab-tco').addEventListener('input', generateReport);
    document.getElementById('tab-shutout').addEventListener('input', generateShutOutReport);

    function copyText(elementId) {
        const text = document.getElementById(elementId).textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert("報告已成功複製！");
        }).catch(err => { alert("複製失敗，請手動全選複製。"); });
    }

    buildDelayDB();
    populateDelayCodeSelect();
    initLogs();
    initPaxList(); 
    generateReport();
    generateShutOutReport();
</script>

</body>
